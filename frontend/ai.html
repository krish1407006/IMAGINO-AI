<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator</title>
    <link rel="stylesheet" href="ai.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="page-loader">
    <div class="loader"></div>
</div>
    <div class="app-container">
        <div class="card">
<!--         
          <video  class="background-video" autoplay loop muted >
                <source src="rdr-snowy-cabin.3840x2160.mp4" type="video/mp4">
         </video> -->   

            <div class="header">
                <h1>AI Image Generator</h1>
                <h3>Enter a prompt and let AI do the magic!</h3>
            </div>

            <div class="controls">
                <div class="prompt-container">
                    <input type="text" id="prompt-input" placeholder="Describe your image ex : mountain , beaches...">
                    <button id="generate-btn">MAGIC</button>
                </div>

            <div id="image-container">
                <div id="placeholder">
                    <svg class="placeholder-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                        <path vector-effect="non-scaling-stroke" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l-1.586-1.586a2 2 0 00-2.828 0L6 14m6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <p>Your generated image will appear here</p>
                </div>
                <div id="loader" class="loader hidden"></div>
                <img id="generated-image" src="" alt="Generated AI Image" class="hidden">
            </div>

            <div id="download-container" class="hidden">
                <button id="download-btn">
                    <svg class="download-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10" />
                    </svg>
                    Download Image
                </button>
            </div>

            <div id="error-box" class="hidden">
                <strong>Oops!</strong>
                <span id="error-message">Something went wrong. Please try again.</span>
            </div>

        </div>
    </div>

    <script src="ai.js"></script>
</body>
</html>
