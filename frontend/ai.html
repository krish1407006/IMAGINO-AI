<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagino AI — Generator</title>
    <link rel="stylesheet" href="ai.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scanlines"></div>
    <div class="grid-overlay"></div>

    <div id="page-loader">
        <div class="loader-ring"></div>
    </div>

    <div class="app-container">
        <nav class="navbar">
            <div class="logo">
                <span class="logo-bracket">&lt;</span>
                <span class="logo-text">IMAGINO<span class="dim">_</span>AI</span>
                <span class="logo-bracket">/&gt;</span>
            </div>
            <a href="./index.html" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                <span>RETURN</span>
            </a>
        </nav>

        <main class="main">
            <div class="header">
                <div class="header-badge">
                    <span class="badge-dot"></span>
                    SYSTEM v2.0 — ONLINE
                </div>
                <h1 class="glitch" data-text="NEURAL_IMAGE_SYNTH">NEURAL IMAGE SYNTH</h1>
                <p class="header-sub">INPUT your prompt below. OUTPUT will be generated in real-time.</p>
            </div>

            <div class="controls">
                <div class="input-group">
                    <span class="input-prefix">&gt;</span>
                    <input type="text" id="prompt-input" placeholder="describe_your_vision...">
                    <button id="generate-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        EXECUTE
                    </button>
                </div>
            </div>

            <div id="image-container">
                <div id="placeholder">
                    <div class="placeholder-frame">
                        <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <path d="M21 15l-5-5L5 21"/>
                        </svg>
                    </div>
                    <p class="placeholder-text">AWAITING INPUT</p>
                    <p class="placeholder-sub">generated image will appear here</p>
                </div>
                <div id="loader" class="hidden">
                    <div class="loader-spinner"></div>
                    <span class="loader-text">GENERATING...</span>
                </div>
                <img id="generated-image" src="" alt="Generated AI Image" class="hidden">
            </div>

            <div id="download-container" class="hidden">
                <button id="download-btn">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    DOWNLOAD
                </button>
                <button id="reset-btn">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
                    RESET
                </button>
            </div>

            <div id="error-box" class="hidden">
                <span class="error-indicator">!</span>
                <span id="error-message">Something went wrong. Please try again.</span>
            </div>
        </main>

        <footer class="footer">
            <p>IMAGINO_AI // WHERE IMAGINATION MEETS INTELLIGENCE</p>
        </footer>
    </div>

    <script src="ai.js"></script>
</body>
</html>
