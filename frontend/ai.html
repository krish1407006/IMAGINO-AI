<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagino AI</title>
    <link rel="stylesheet" href="ai.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="diagonal-bg"></div>
    <div class="diagonal-line l1"></div>
    <div class="diagonal-line l2"></div>
    <div class="diagonal-line l3"></div>

    <div id="page-loader">
        <div class="loader-ring"></div>
    </div>

    <div class="app-container">
        <nav class="navbar">
            <div class="logo">
                <span class="logo-mark">Imagino</span>
                <span class="logo-accent">AI</span>
            </div>
            <a href="./index.html" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Back
            </a>
        </nav>

        <main class="main">
            <div class="header">
                <div class="header-badge">image generation</div>
                <h1>Imagino <span class="hl">AI</span></h1>
                <p class="header-sub">Describe what you see in your mind — and watch it appear.</p>
            </div>

            <div class="controls">
                <div class="input-group">
                    <input type="text" id="prompt-input" placeholder="e.g. a neon cityscape reflecting on water...">
                    <button id="generate-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        Generate
                    </button>
                </div>
            </div>

            <div id="image-container">
                <div id="placeholder">
                    <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                    <p class="placeholder-text">Your image will appear here</p>
                </div>
                <div id="loader" class="hidden">
                    <div class="loader-spinner"></div>
                    <span>Generating...</span>
                </div>
                <img id="generated-image" src="" alt="Generated AI Image" class="hidden">
            </div>

            <div id="download-container" class="hidden">
                <button id="download-btn">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download
                </button>
                <button id="reset-btn">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
                    New Image
                </button>
            </div>

            <div id="error-box" class="hidden">
                <span class="error-icon">!</span>
                <span id="error-message">Something went wrong. Please try again.</span>
            </div>
        </main>

        <footer class="footer">
            <p>Imagino AI</p>
        </footer>
    </div>

    <script src="ai.js"></script>
</body>
</html>
