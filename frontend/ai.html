<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagino AI — Generator</title>
    <link rel="stylesheet" href="ai.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div id="page-loader">
        <div class="loader-inner"></div>
    </div>

    <div class="app-container">
        <nav class="navbar">
            <div class="logo">
                <span class="logo-diamond">&#9670;</span>
                <span class="logo-text">Imagino<span class="highlight">AI</span></span>
            </div>
            <a href="./index.html" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Back
            </a>
        </nav>

        <main class="main">
            <div class="badge">AI Image Generator</div>
            <h1 class="title">Imagino <span class="highlight">AI</span></h1>
            <p class="sub">Describe your vision and let AI bring it to life in seconds.</p>

            <div class="input-row">
                <input type="text" id="prompt-input" placeholder="e.g. a cyberpunk city at sunset, neon lights reflecting on wet pavement...">
                <button id="generate-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Generate
                </button>
            </div>

            <div id="image-container">
                <div id="placeholder">
                    <svg class="placeholder-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                    <p class="placeholder-main">Your image will appear here</p>
                    <p class="placeholder-sub">Enter a prompt above and click Generate</p>
                </div>
                <div id="loader" class="hidden">
                    <div class="spinner"></div>
                    <span class="loader-label">Generating...</span>
                </div>
                <img id="generated-image" src="" alt="Generated AI Image" class="hidden">
            </div>

            <div id="download-container" class="hidden">
                <button id="download-btn">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download
                </button>
                <button id="reset-btn">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
                    New Image
                </button>
            </div>

            <div id="error-box" class="hidden">
                <span class="error-mark">!</span>
                <span id="error-message">Something went wrong. Please try again.</span>
            </div>
        </main>

        <footer class="footer">
            <p>Imagino AI &mdash; Where imagination meets intelligence</p>
        </footer>
    </div>

    <script src="ai.js"></script>
    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, diagonals = [];

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        class Diagonal {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w * 1.5 - w * 0.25;
                this.y = Math.random() * h * 1.5 - h * 0.25;
                this.len = Math.random() * 60 + 20;
                this.speed = Math.random() * 0.6 + 0.2;
                this.angle = Math.random() * 0.6 + 0.4;
                this.opacity = Math.random() * 0.15 + 0.05;
                this.width = Math.random() * 1.5 + 0.5;
            }
            update() {
                this.x += this.speed * Math.cos(this.angle);
                this.y += this.speed * Math.sin(this.angle);
                if (this.x > w * 1.3 || this.x < -w * 0.3 || this.y > h * 1.3 || this.y < -h * 0.3) this.reset();
            }
            draw() {
                const ex = this.x + this.len * Math.cos(this.angle);
                const ey = this.y + this.len * Math.sin(this.angle);
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(ex, ey);
                ctx.strokeStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.lineWidth = this.width;
                ctx.stroke();
            }
        }

        for (let i = 0; i < 50; i++) diagonals.push(new Diagonal());

        function animate() {
            ctx.clearRect(0, 0, w, h);
            diagonals.forEach(d => { d.update(); d.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
